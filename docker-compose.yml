version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: forgot-password-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  app:
    build: .
    container_name: forgot-password-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/forgot-password-db?authSource=admin
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - app-network
    env_file:
      - .env

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
